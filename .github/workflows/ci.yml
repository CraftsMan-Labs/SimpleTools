name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Sync
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check simpletools tests && uv run ruff format simpletools tests --check

      - name: Mypy
        run: uv run mypy simpletools

      - name: Pyright
        run: uv run pyright

      - name: Tests
        run: uv run python -m unittest discover -s tests -v

      - name: Build package
        run: uv build
