name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"

      - name: Build
        run: uv build

      - name: Publish with uv
        run: uv publish
        env:
          # Prefer PYPI_TOKEN; keep PYPI_API_TOKEN for older repo configurations
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN || secrets.PYPI_API_TOKEN }}
